<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" />
  <!-- Chain links representing traceability -->
  <g fill="none" stroke="white" stroke-width="8" stroke-linecap="round">
    <!-- Link 1 -->
    <ellipse cx="60" cy="75" rx="22" ry="14" transform="rotate(-30 60 75)" stroke-width="8"/>
    <!-- Link 2 -->
    <ellipse cx="100" cy="100" rx="22" ry="14" transform="rotate(-30 100 100)" stroke-width="8"/>
    <!-- Link 3 -->
    <ellipse cx="140" cy="125" rx="22" ry="14" transform="rotate(-30 140 125)" stroke-width="8"/>
  </g>
  <!-- Center dots -->
  <circle cx="60" cy="75" r="5" fill="white" opacity="0.9"/>
  <circle cx="100" cy="100" r="5" fill="white" opacity="0.9"/>
  <circle cx="140" cy="125" r="5" fill="white" opacity="0.9"/>
  <!-- Connecting lines -->
  <line x1="75" y1="82" x2="85" y2="93" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="115" y1="107" x2="125" y2="118" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- TX text -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="white" opacity="0.95">TXNG</text>
</svg>
